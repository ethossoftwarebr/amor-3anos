<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — essa possibilidade não existe</title>
  <link rel="stylesheet" href="/styles/base.css" />
  <style>
    body {
      background: #0a0000;
      color: #ff3838;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--safe-x);
      text-align: center;
      font-family: 'Courier New', monospace;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at 20% 30%, rgba(255, 0, 0, 0.15), transparent 40%),
        radial-gradient(circle at 80% 70%, rgba(139, 0, 0, 0.25), transparent 50%),
        repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255, 0, 0, 0.04) 2px, rgba(255, 0, 0, 0.04) 4px);
      pointer-events: none;
      animation: scan 8s linear infinite;
    }

    @keyframes scan {
      0% { background-position: 0 0, 0 0, 0 0; }
      100% { background-position: 0 0, 0 0, 0 100px; }
    }

    .glitch {
      font-size: clamp(2.2rem, 8vw, 5rem);
      font-weight: 900;
      letter-spacing: 0.05em;
      text-shadow:
        2px 0 #ff00ff,
        -2px 0 #00ffff;
      animation: glitch 0.3s infinite;
      margin-bottom: 1.5rem;
      max-width: 22ch;
      line-height: 1.1;
    }

    @keyframes glitch {
      0%, 100% { transform: translate(0); }
      20% { transform: translate(-2px, 1px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, 2px); }
      80% { transform: translate(1px, -2px); }
    }

    .codigo {
      font-size: 1rem;
      letter-spacing: 0.3em;
      color: #ff8080;
      margin-bottom: 2rem;
      opacity: 0.7;
    }

    .desc {
      font-family: 'Courier New', monospace;
      font-size: clamp(1rem, 2.4vw, 1.2rem);
      color: #ffaaaa;
      max-width: 40ch;
      margin-bottom: 2.5rem;
      line-height: 1.6;
    }

    .desc em {
      color: #ff3838;
      font-style: normal;
      font-weight: bold;
    }

    .blink {
      animation: blink 1s steps(2) infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    .voltar {
      display: inline-block;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #fff;
      background: #8b0000;
      padding: 1rem 2rem;
      border: 2px solid #ff3838;
      border-radius: 4px;
      transition: all 0.2s;
      cursor: pointer;
    }

    .voltar:hover {
      background: #ff3838;
      color: #0a0000;
      box-shadow: 0 0 24px rgba(255, 56, 56, 0.6);
      letter-spacing: 0.2em;
    }

    .info {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      color: rgba(255, 56, 56, 0.4);
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <p class="codigo">[ ERROR 404 ]</p>
  <h1 class="glitch">essa possibilidade não existe<span class="blink">_</span></h1>
  <p class="desc">
    <em>O servidor do amor recusou sua resposta.</em><br /><br />
    Reverificando dependências do coração...<br />
    Reconectando ao núcleo do "para sempre"...<br />
    Tente novamente — dessa vez, a resposta certa.
  </p>
  <a class="voltar" href="/index.html#contrato">↩ voltar e responder direito</a>
  <p class="info">SISTEMA DE NAMORO v3.0.0 · uptime: 1.096 dias</p>
</body>
</html>
